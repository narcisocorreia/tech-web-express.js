<div class="auth-bg">
  <div class="auth-card card">
    <!-- Card Header -->
    <div class="auth-card-header">
      <div class="auth-icon-box">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h3 class="fw-bold mb-1 auth-header-title">Welcome back</h3>
      <p class="mb-0 small auth-header-sub">
        Sign in to continue to your account
      </p>
    </div>

    <!-- Card Body -->
    <div class="card-body auth-card-body">
      @if (message) {
        <div class="alert alert-danger d-flex align-items-center gap-2 mb-4">
          <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
          {{ message }}
        </div>
      }

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <div class="input-group has-validation">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input
            class="form-control form-control-x"
            [class.is-invalid]="errors.email"
            type="email"
            placeholder="you@example.com"
            [(ngModel)]="email"
          />
          @if (errors.email) {
            <div class="invalid-feedback">{{ errors.email }}</div>
          }
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group has-validation has-toggle">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input
            class="form-control form-control-x"
            [class.is-invalid]="errors.password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter your password"
            [(ngModel)]="password"
          />
          <button
            type="button"
            class="btn btn-eye"
            (click)="showPassword = !showPassword"
            tabindex="-1"
          >
            <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
          </button>
          @if (errors.password) {
            <div class="invalid-feedback">{{ errors.password }}</div>
          }
        </div>
      </div>

      <button
        class="btn btn-brand w-100 py-2"
        (click)="login()"
        [disabled]="isLoading"
      >
        @if (isLoading) {
          <span
            class="spinner-border spinner-border-sm me-2"
            role="status"
          ></span
          >Signing in...
        } @else {
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        }
      </button>

      <div class="divider-text">or</div>

      <p class="text-center mb-0 auth-footer-text">
        Don't have an account?
        <a routerLink="/register" class="auth-link">Create one here</a>
      </p>
    </div>
  </div>
</div>
